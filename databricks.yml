# Databricks Asset Bundle Configuration
# Reference: https://docs.databricks.com/dev-tools/bundles/settings.html
#
# Jobs in jobs/ use these variables for catalog, schema, volume, model name, and approval thresholds.
# The e2e pipeline job also defines job parameters run_realtime and run_batch (see e2e-pipeline-job.yml).

bundle:
  name: byo-model

# Include job definitions from jobs/ directory
include:
  - jobs/*.yml

# Variables for parameterization across environments (match README / notebook defaults)
variables:
  catalog_name:
    description: Unity Catalog name
    default: pcl
  schema_name:
    description: Schema name within the catalog
    default: byo_model
  volume_name:
    description: Volume name for model artifacts
    default: volume
  model_name:
    description: Registered model name (e.g. pyfunc_xgb, native_torch)
    default: pyfunc_xgb
  experiment_path:
    description: MLflow experiment path (used by BYOM logging notebooks)
    default: ""
  experiment_name:
    description: MLflow experiment name (used by retrain notebooks)
    default: /Shared/byo_model_experiment
  features_table_name:
    description: UC table name for training features
    default: iris_features
  labels_table_name:
    description: UC table name for training labels
    default: iris_labels
  accuracy_threshold:
    description: Minimum accuracy for model approval
    default: "0.25"
  f1_threshold:
    description: Minimum F1 score for model approval
    default: "0.10"

# Workspace configuration
workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

# Target environments (override variables per target as needed)
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
    variables:
      catalog_name: pcl
      schema_name: byo_model

  prod:
    mode: production
    # workspace.host must be set via DATABRICKS_HOST env var or databricks auth login
    # Variable interpolation is not supported for workspace.host
    variables:
      catalog_name: pcl
      schema_name: byo_model
    run_as:
      # service_principal_name: ml-prod-sp
      user_name: ${workspace.current_user.userName}

# Artifact synchronization
sync:
  include:
    - artifacts/**/*.ipynb
  exclude:
    - "*.pyc"
    - "__pycache__"
    - ".git"

# Resources (additional resources can be defined here)
resources:
  # Jobs are defined in jobs/*.yml files
  # Note: MLflow experiments are created by the notebooks via mlflow.set_experiment()
  # and cannot be created inside a Git repo folder by DABs.
